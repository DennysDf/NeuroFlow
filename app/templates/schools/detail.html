{% extends "base.html" %}
{% block title %}{{ school.name }}{% endblock %}
{% block content %}
<div class="card max-w-2xl">
  <h1 class="text-2xl font-bold">{{ school.name }}</h1>
  <p class="text-gray-500">{{ school.organization.name }}</p>
  <dl class="mt-4 grid grid-cols-2 gap-4 text-sm">
    <div><dt class="text-gray-500">Endereço</dt><dd>{{ school.address or '-' }}</dd></div>
    <div><dt class="text-gray-500">Telefone</dt><dd>{{ school.phone or '-' }}</dd></div>
  </dl>
</div>
{% endblock %}
